<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="F1InsightAI — AI-powered Text-to-SQL RAG chatbot for Formula 1 race data (1950–2024)">
    <title>F1InsightAI — Formula 1 Data Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <!-- Particle Background -->
    <div id="tsparticles"></div>

    <!-- History Drawer Trigger -->
    <button class="history-trigger" id="historyTrigger" title="Chat History">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>History</span>
    </button>

    <!-- Status Badge (floating top-right) -->
    <div class="status-float" id="statusFloat">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting...</span>
    </div>

    <!-- History Drawer (slides from left) -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="history-drawer" id="historyDrawer">
        <div class="drawer-header">
            <h3>Chat History</h3>
            <button class="drawer-close" id="drawerClose" title="Close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="drawer-new-chat">
            <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                New Chat
            </button>
        </div>
        <div class="drawer-content" id="chatList">
            <div class="sidebar-empty">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    opacity="0.3">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
                <p>No conversations yet</p>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="clear-history-btn" id="clearAllChats">Clear All Chats</button>
        </div>
    </aside>

    <!-- Main App Shell -->
    <div class="app-shell" id="appShell">

        <!-- Hero Search (centered initial state) -->
        <div class="search-hero" id="searchHero">
            <div class="hero-logo">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="2" width="20" height="20" rx="4" stroke="url(#heroGrad)" stroke-width="1.5"/>
                    <path d="M7 7h4v4H7zM13 7h4v4h-4zM7 13h4v4H7zM13 13h4v4h-4z" fill="url(#heroGrad)" opacity="0.3"/>
                    <path d="M7 7h4v4H7zM13 13h4v4h-4z" fill="url(#heroGrad)" opacity="0.7"/>
                    <defs>
                        <linearGradient id="heroGrad" x1="0" y1="0" x2="24" y2="24">
                            <stop offset="0%" stop-color="#E10600"/>
                            <stop offset="100%" stop-color="#FF6B35"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="hero-title">F1Insight<span class="accent">AI</span></h1>
                <p class="hero-subtitle">Formula 1 Data Intelligence · 1950–2024</p>
            </div>

            <!-- Database Stats -->
            <div class="hero-stats" id="dbStats">
                <div class="hero-stat">
                    <span class="hero-stat-value" id="statTables">—</span>
                    <span class="hero-stat-label">Tables</span>
                </div>
                <div class="hero-stat">
                    <span class="hero-stat-value" id="statRows">—</span>
                    <span class="hero-stat-label">Records</span>
                </div>
                <div class="hero-stat">
                    <span class="hero-stat-value" id="statColumns">—</span>
                    <span class="hero-stat-label">Columns</span>
                </div>
                <div class="hero-stat">
                    <span class="hero-stat-value" id="statModel">—</span>
                    <span class="hero-stat-label">AI Model</span>
                </div>
            </div>

            <!-- Suggestion Chips -->
            <div class="hero-suggestions">
                <button class="hero-chip" onclick="askQuestion(this.textContent)">Who has the most race wins?</button>
                <button class="hero-chip" onclick="askQuestion(this.textContent)">Compare Hamilton vs Verstappen</button>
                <button class="hero-chip" onclick="askQuestion(this.textContent)">2023 race calendar</button>
                <button class="hero-chip" onclick="askQuestion(this.textContent)">Average pit stop by team</button>
            </div>
        </div>

        <!-- Response Canvas (hidden initially, shown after first query) -->
        <main class="response-canvas" id="responseCanvas"></main>

        <!-- Search Input (starts inside hero, docks to bottom on submit) -->
        <footer class="search-dock" id="searchDock">
            <form class="search-input-wrap" id="chatForm">
                <textarea id="userInput" placeholder="Ask about F1 — drivers, races, teams, lap times..." rows="1"
                    autofocus></textarea>
                <button type="submit" class="search-send" id="sendBtn" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
            <div class="search-hint">
                Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line
            </div>
        </footer>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
